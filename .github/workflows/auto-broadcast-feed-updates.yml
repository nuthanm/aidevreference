name: Auto Broadcast Feed Updates

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  auto-broadcast:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger auto-broadcast endpoint
        shell: bash
        env:
          AUTO_BROADCAST_ENDPOINT_URL: ${{ secrets.AUTO_BROADCAST_ENDPOINT_URL }}
          CRON_BROADCAST_KEY: ${{ secrets.CRON_BROADCAST_KEY }}
        run: |
          if [ -z "$AUTO_BROADCAST_ENDPOINT_URL" ]; then
            echo "Missing secret: AUTO_BROADCAST_ENDPOINT_URL"
            exit 1
          fi

          if [ -z "$CRON_BROADCAST_KEY" ]; then
            echo "Missing secret: CRON_BROADCAST_KEY"
            exit 1
          fi

          echo "Calling auto-broadcast endpoint..."
          response_file=$(mktemp)

          http_code=$(curl --show-error --silent \
            -o "$response_file" \
            -w "%{http_code}" \
            -X POST "$AUTO_BROADCAST_ENDPOINT_URL" \
            -H "content-type: application/json" \
            -H "x-cron-key: $CRON_BROADCAST_KEY")

          cat "$response_file"
          echo ""

          if [ "$http_code" -ge 400 ]; then
            echo "Auto-broadcast failed with HTTP $http_code"
            exit 1
          fi

          echo "Auto-broadcast completed successfully."
